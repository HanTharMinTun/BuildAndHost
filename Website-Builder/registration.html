<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Registration Form</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 500px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #0077cc;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #0077cc;
        }

        .gender {
            display: flex;
            gap: 20px;
        }

        .gender input {
            width: auto;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0077cc;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #005fa3;
        }

        .login {
            text-align: center;
            margin-top: 15px;
        }

        .login a {
            color: #0077cc;
            text-decoration: none;
        }

        @media(max-width:600px){
            .container{
                width:90%;
            }
        }

    </style>

</head>

<body>

<div class="container">

    <h2>University Registration Form</h2>

    <form>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>
        </div>


        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" required>
        </div>


        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Create password" required>
        </div>


        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date">
        </div>


        <div class="form-group">
            <label>Gender</label>
            <div class="gender">
                <label>
                    <input type="radio" name="gender"> Male
                </label>

                <label>
                    <input type="radio" name="gender"> Female
                </label>

                <label>
                    <input type="radio" name="gender"> Other
                </label>
            </div>
        </div>


        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="09xxxxxxxxx">
        </div>


        <div class="form-group">
            <label>Choose Faculty</label>

            <select>
                <option>Select Faculty</option>
                <option>Computer Science</option>
                <option>Engineering</option>
                <option>Business Management</option>
                <option>Arts</option>
                <option>Science</option>
            </select>

        </div>


        <div class="form-group">

            <label>Address</label>

            <textarea rows="3" placeholder="Enter your address"></textarea>

        </div>


        <div class="form-group">

            <label>Upload Photo</label>

            <input type="file">

        </div>


        <button type="submit">
            Register Now
        </button>


        <div class="login">
            Already have an account?
            <a href="#">Login</a>
        </div>


    </form>

</div>


</body>
</html>
